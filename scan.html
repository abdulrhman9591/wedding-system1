<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ماسح الدخول | فخامة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #fdf2f2; margin: 0; padding: 20px; text-align: center; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; background: #000; }
        .status-msg { margin-top: 20px; padding: 15px; border-radius: 10px; font-weight: bold; display: none; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .btn-back { margin-top: 20px; background: #888; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:#c5a059">جهاز فحص التصاريح</h2>
    <div id="reader"></div>
    <div id="result-msg" class="status-msg"></div>
    <button class="btn-back" onclick="window.close()">إغلاق الصفحة</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBycODn3kTe7uRIBYifDogSPmv2towU6lA", projectId: "wedding-system-6fadd", appId: "1:902051092170:web:e228d3138a5b091b974633" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const msgBox = document.getElementById('result-msg');

    function showMsg(text, type) {
        msgBox.innerText = text;
        msgBox.className = `status-msg ${type}`;
        msgBox.style.display = 'block';
        setTimeout(() => { msgBox.style.display = 'none'; }, 3000);
    }

    function onScanSuccess(decodedText) {
        // تجنب التكرار السريع
        html5QrcodeScanner.pause();
        
        const guestRef = doc(db, "v30_guests", decodedText);
        getDoc(guestRef).then(async (snap) => {
            if(snap.exists()) {
                if(snap.data().status === "حضور") {
                    showMsg("⚠️ هذا الضيف مسجل حضور مسبقاً: " + snap.data().name, "error");
                } else {
                    await updateDoc(guestRef, { status: "حضور" });
                    showMsg("✅ تم تسجيل دخول: " + snap.data().name, "success");
                    // تشغيل صوت تنبيه بسيط إذا أردت
                    new Audio('https://www.soundjay.com/buttons/beep-07a.mp3').play();
                }
            } else {
                showMsg("❌ باركود غير معروف!", "error");
            }
            setTimeout(() => { html5QrcodeScanner.resume(); }, 2000);
        });
    }

    let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    html5QrcodeScanner.render(onScanSuccess);
</script>
</body>
</html>
