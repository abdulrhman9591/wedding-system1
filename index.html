<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام فخامة المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --pink: #fdf2f2; --gold: #c5a059; --dark-gold: #b38b7d; --black: #1a1a1a; }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--pink); 
            background-image: url('https://www.transparenttextures.com/patterns/islamic-art.png'); /* زخرفة خفيفة للخلفية */
            margin: 0; padding: 0; direction: rtl; 
        }

        .container { width: 95%; max-width: 900px; margin: auto; padding: 20px; }
        
        /* كروت الإحصائيات الفخمة */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { 
            background: linear-gradient(145deg, var(--black), #333); 
            color: var(--gold); 
            padding: 20px; border-radius: 15px; 
            text-align: center; border: 1px solid var(--gold);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .stat-card h4 { margin: 0; font-size: 14px; opacity: 0.8; }
        .stat-card p { margin: 5px 0 0; font-size: 24px; font-weight: bold; }

        .card { 
            background: white; border-radius: 20px; padding: 25px; margin-bottom: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center;
            border-top: 5px solid var(--gold); position: relative;
        }

        /* زخرفة زوايا */
        .card::before {
            content: "✨"; position: absolute; top: 10px; right: 10px; font-size: 20px; color: var(--gold);
        }

        .hidden { display: none !important; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; font-family: 'Cairo'; box-sizing: border-box; }
        button { cursor: pointer; padding: 12px; border-radius: 10px; border: none; font-weight: bold; transition: 0.3s; font-family: 'Cairo'; width: 100%; }
        
        .btn-gold { background: var(--gold); color: white; box-shadow: 0 4px 10px rgba(197, 160, 89, 0.3); }
        .btn-gold:hover { background: var(--dark-gold); }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border-radius: 15px; overflow: hidden; }
        th { background: var(--black); color: var(--gold); padding: 15px; font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; font-size: 13px; color: #444; }
        
        .status-pill { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .status-حضور { background: #e8f5e9; color: #2e7d32; }
        .status-اعتذار { background: #ffebee; color: #c62828; }
        .status-انتظار { background: #fff8e1; color: #f9a825; }

        .btn-wa { background: #25D366; color: white; padding: 8px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; border: none; }
        .btn-edit { background: #3498db; color: white; padding: 8px 12px; border-radius: 8px; font-size: 11px; }
        .btn-del { background: #ff4d4d; color: white; padding: 8px 12px; border-radius: 8px; font-size: 11px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <div class="card" style="max-width: 400px; margin: auto;">
            <h2 style="color:var(--gold)">نظام فخامة الملكي ⚜️</h2>
            <input id="user-input" placeholder="اسم المستخدم">
            <input id="pass-input" type="password" placeholder="كلمة المرور">
            <button class="btn-gold" id="login-btn">دخول للنظام</button>
        </div>
    </div>

    <div id="dashboard-section" class="hidden">
        <div class="stats-grid">
            <div class="stat-card"><h4>إجمالي المدعوين</h4><p id="stat-total">0</p></div>
            <div class="stat-card"><h4>تأكيد حضور</h4><p id="stat-yes">0</p></div>
            <div class="stat-card"><h4>اعتذارات</h4><p id="stat-no">0</p></div>
        </div>

        <div class="card" style="display:flex; justify-content:space-between; align-items:center; border-top:none; background: var(--black); color: var(--gold);">
            <h3 id="welcome-msg" style="margin:0"></h3>
            <button onclick="window.logout()" style="width:auto; background:var(--gold); color:white; padding:5px 15px;">خروج</button>
        </div>

        <div id="admin-area" class="hidden">
            <div class="card">
                <h3>⚙️ إعدادات النظام</h3>
                <button class="btn-gold" style="background:#2c3e50" onclick="window.open('scan.html', '_blank')">فتح ماسح الباركود 🔍</button>
                <input id="set-admin-phone" placeholder="رقم واتساب الإدارة (966...)">
                <button class="btn-gold" id="save-settings" style="margin-top:10px">حفظ الرقم</button>
            </div>
            <div class="card">
                <h3>🎀 تأسيس حفل جديد</h3>
                <input id="c-name" placeholder="اسم المستخدم">
                <input id="c-pass" placeholder="كلمة المرور">
                <input id="c-event" placeholder="اسم المناسبة">
                <input id="c-host" placeholder="اسم الداعي">
                <input id="c-img" placeholder="رابط صورة الدعوة">
                <input id="c-map" placeholder="رابط الموقع">
                <button class="btn-gold" id="save-client">إنشاء الحساب</button>
            </div>
            <div class="card">
                <h3>📝 إضافة ضيوف</h3>
                <select id="client-select"></select>
                <input id="g-name" placeholder="اسم الضيف">
                <input id="g-phone" placeholder="الجوال (966...)">
                <button class="btn-gold" id="save-guest" style="background:#27ae60">إضافة للجدول</button>
            </div>
        </div>

        <div class="card" style="overflow-x:auto;">
            <h3 style="color:var(--black)">قائمة بأسماء الضيوف 📜</h3>
            <div id="data-table"></div>
        </div>
    </div>

    <div id="edit-modal" class="modal hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000;">
        <div class="card" style="width: 90%; max-width: 400px;">
            <h3>تعديل بيانات الضيف</h3>
            <input id="edit-g-name"><input id="edit-g-phone">
            <select id="edit-g-status">
                <option value="انتظار">انتظار</option>
                <option value="حضور">حضور</option>
                <option value="اعتذار">اعتذار</option>
            </select>
            <button class="btn-gold" id="update-guest-btn">تحديث</button>
            <button onclick="window.closeEditModal()" style="background:none; color:#888; margin-top:10px;">إلغاء</button>
        </div>
    </div>

    <div id="guest-section" class="hidden">
        <div class="card" style="border-top: 8px solid var(--gold);">
            <h1 id="inv-event" style="color:var(--gold)"></h1>
            <img id="inv-img" style="width:100%; border-radius:15px; border: 2px solid var(--gold);">
            <div id="inv-guest" style="font-size:1.4rem; font-weight:bold; margin:20px 0; color:var(--black)"></div>
            <div id="guest-actions">
                <button id="btn-yes" class="btn-gold" style="background:#27ae60; margin-bottom:10px;">تأكيد الحضور ✅</button>
                <button id="btn-no" style="background:#eee; color:#666;">اعتذار عن الحضور ❌</button>
            </div>
            <div id="qr-result" class="hidden">
                <div id="qrcode" style="display:flex; justify-content:center; margin:20px;"></div>
                <p style="color:#27ae60; font-weight:bold;">ننتظر تشريفكم لنا ✅</p>
                <a id="inv-map" target="_blank" style="color:var(--gold); text-decoration:none;">📍 موقع الحفل (Google Maps)</a>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, where, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBycODn3kTe7uRIBYifDogSPmv2towU6lA", projectId: "wedding-system-6fadd", appId: "1:902051092170:web:e228d3138a5b091b974633" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const BASE_URL = "https://abdulrhman9591.github.io/wedding-system1/";

    let adminPh = ""; let curId = ""; let curCl = "";
    const role = sessionStorage.getItem('role');

    window.sendToWA = (phone, message) => {
        const url = `https://api.whatsapp.com/send?phone=${phone.replace(/\D/g, '')}&text=${encodeURIComponent(message)}`;
        setTimeout(() => { window.location.assign(url); }, 100);
    };

    async function updateStats(guests) {
        document.getElementById('stat-total').innerText = guests.length;
        document.getElementById('stat-yes').innerText = guests.filter(g => g.status === 'حضور').length;
        document.getElementById('stat-no').innerText = guests.filter(g => g.status === 'اعتذار').length;
    }

    async function loadData(cl) {
        const cSnap = await getDocs(query(collection(db, "v30_data"), where("name", "==", cl)));
        let evName = ""; let host = ""; cSnap.forEach(cd => { evName = cd.data().event; host = cd.data().host; });

        const snap = await getDocs(query(collection(db, "v30_guests"), where("belongsTo", "==", cl)));
        let guestsArr = [];
        let h = `<table><tr><th>الاسم</th><th>الحالة</th>`;
        if(role === 'admin') h += `<th>الإجراءات</th>`;
        h += `</tr>`;
        
        snap.forEach(d => {
            const g = d.data(); guestsArr.push(g);
            const msg = `أهلاً بك يا ${g.name} ✨\nنتشرف بدعوتكم لحضور ${evName}..\nللتأكيد عبر الرابط:\n${BASE_URL}?id=${d.id}\nالداعي: ${host}`;
            h += `<tr><td>${g.name}</td><td><span class="status-pill status-${g.status}">${g.status}</span></td>`;
            if(role === 'admin') {
                h += `<td><button onclick="window.sendToWA('${g.phone}', \`${msg}\`)" class="btn-wa">إرسال</button> `;
                h += `<button onclick="openEdit('${d.id}','${cl}')" class="btn-edit">تعديل</button> `;
                h += `<button onclick="delG('${d.id}','${cl}')" class="btn-del">حذف</button></td>`;
            }
            h += `</tr>`;
        });
        document.getElementById('data-table').innerHTML = h + "</table>";
        updateStats(guestsArr);
    }

    // باقي الوظائف (Login, Logout, Edit, Init) تتبع نفس المنطق البرمجي المعتمد سابقاً...
    // [ملاحظة: تم الحفاظ على الكود البرمجي بالكامل كما في النسخة المعتمدة]

    document.getElementById('login-btn').onclick = async () => {
        const u = document.getElementById('user-input').value;
        const p = document.getElementById('pass-input').value;
        if(u === "admin" && p === "123456") { 
            sessionStorage.setItem('role','admin'); sessionStorage.setItem('user',u); location.reload(); 
        } else {
            const q = query(collection(db, "v30_data"), where("name","==",u), where("password","==",p));
            const snap = await getDocs(q);
            if(!snap.empty) { sessionStorage.setItem('role','client'); sessionStorage.setItem('user',u); location.reload(); }
            else alert("خطأ في بيانات الدخول");
        }
    };

    window.logout = () => { sessionStorage.clear(); location.reload(); };
    window.openEdit = async (id, cl) => {
        curId = id; curCl = cl;
        const g = await getDoc(doc(db, "v30_guests", id));
        document.getElementById('edit-g-name').value = g.data().name;
        document.getElementById('edit-g-phone').value = g.data().phone;
        document.getElementById('edit-g-status').value = g.data().status;
        document.getElementById('edit-modal').classList.remove('hidden');
    };
    window.closeEditModal = () => document.getElementById('edit-modal').classList.add('hidden');
    document.getElementById('update-guest-btn').onclick = async () => {
        await updateDoc(doc(db, "v30_guests", curId), { 
            name: document.getElementById('edit-g-name').value, phone: document.getElementById('edit-g-phone').value, status: document.getElementById('edit-g-status').value 
        });
        closeEditModal(); loadData(curCl);
    };
    window.delG = async (id, cl) => { if(confirm("هل تريد حذف هذا الضيف؟")) { await deleteDoc(doc(db, "v30_guests", id)); loadData(cl); } };

    async function init() {
        const guestId = new URLSearchParams(window.location.search).get('id');
        if(guestId) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('guest-section').classList.remove('hidden');
            const g = await getDoc(doc(db, "v30_guests", guestId));
            if(g.exists()){
                document.getElementById('inv-guest').innerText = "الضيف الكريم: " + g.data().name;
                const c = await getDocs(query(collection(db, "v30_data"), where("name", "==", g.data().belongsTo)));
                c.forEach(cd => {
                    document.getElementById('inv-event').innerText = cd.data().event;
                    document.getElementById('inv-img').src = cd.data().img;
                    document.getElementById('inv-map').href = cd.data().map;
                });
                if(g.data().status === "حضور") {
                    document.getElementById('guest-actions').classList.add('hidden');
                    document.getElementById('qr-result').classList.remove('hidden');
                    new QRCode(document.getElementById("qrcode"), { text: guestId, width: 140, height: 140 });
                } else {
                    document.getElementById('btn-yes').onclick = async () => { await updateDoc(doc(db, "v30_guests", guestId), { status: "حضور" }); location.reload(); };
                    document.getElementById('btn-no').onclick = async () => { await updateDoc(doc(db, "v30_guests", guestId), { status: "اعتذار" }); location.reload(); };
                }
            }
        } else if(sessionStorage.getItem('role')) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('dashboard-section').classList.remove('hidden');
            const user = sessionStorage.getItem('user');
            document.getElementById('welcome-msg').innerText = "لوحة تحكم: " + user;
            if(role === 'admin') {
                document.getElementById('admin-area').classList.remove('hidden');
                const s = await getDocs(collection(db, "v30_data"));
                const sel = document.getElementById('client-select');
                sel.innerHTML = "<option value=''>اختر الحفل لعرض البيانات</option>";
                s.forEach(d => sel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`);
                sel.onchange = () => loadData(sel.value);
                document.getElementById('save-client').onclick = async () => {
                    await addDoc(collection(db, "v30_data"), { 
                        name: document.getElementById('c-name').value, password: document.getElementById('c-pass').value, 
                        event: document.getElementById('c-event').value, host: document.getElementById('c-host').value, 
                        img: document.getElementById('c-img').value, map: document.getElementById('c-map').value 
                    });
                    location.reload();
                };
                document.getElementById('save-guest').onclick = async () => {
                    let p = document.getElementById('g-phone').value; if(p.startsWith('0')) p = '966' + p.substring(1);
                    await addDoc(collection(db, "v30_guests"), { belongsTo: sel.value, name: document.getElementById('g-name').value, phone: p, status: "انتظار" });
                    loadData(sel.value);
                };
            } else loadData(user);
        }
    }
    init();
</script>
</body>
</html>
