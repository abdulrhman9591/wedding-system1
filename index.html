<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام فخامة المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --pink: #fdf2f2; --gold: #c5a059; --dark-gold: #b38b7d; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--pink); margin: 0; padding: 0; direction: rtl; }
        .container { width: 95%; max-width: 800px; margin: auto; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; }
        .hidden { display: none !important; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; font-family: 'Cairo'; box-sizing: border-box; }
        button { cursor: pointer; padding: 12px; border-radius: 10px; border: none; font-weight: bold; transition: 0.3s; font-family: 'Cairo'; width: 100%; }
        .btn-gold { background: var(--gold); color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; font-size: 13px; }
        .btn-wa { background: #25D366; color: white; padding: 8px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; border: none; width: auto; }
        #reader { width: 100%; max-width: 400px; margin: auto; border-radius: 15px; overflow: hidden; }
    </style>
</head>
<body>

<div class="container">
    <div id="landing-page">
        <div class="card">
            <h2 style="color:var(--gold)">طلب تصميم دعوة إلكترونية 🌸</h2>
            <input id="order-name" placeholder="اسمك الكريم">
            <input id="order-count" type="number" placeholder="عدد الضيوف المتوقع">
            <button class="btn-gold" id="send-order">إرسال الطلب عبر واتساب 🚀</button>
            <p style="margin-top:20px; font-size:12px; color:#888; cursor:pointer;" onclick="showLogin()">دخول الإدارة والعملاء</p>
        </div>
    </div>

    <div id="login-section" class="hidden">
        <div class="card">
            <h3>تسجيل الدخول</h3>
            <input id="user-input" placeholder="اسم المستخدم">
            <input id="pass-input" type="password" placeholder="كلمة المرور">
            <button class="btn-gold" id="login-btn">دخول</button>
            <button onclick="location.reload()" style="background:none; color:#888;">رجوع</button>
        </div>
    </div>

    <div id="dashboard-section" class="hidden">
        <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
            <h3 id="welcome-msg"></h3>
            <button onclick="window.logout()" style="width:auto; background:#888; color:white; padding:5px 15px;">خروج</button>
        </div>

        <div id="admin-scanner" class="hidden">
            <div class="card">
                <h3>🔍 ماسح الباركود (الإسكان)</h3>
                <div id="reader"></div>
                <button class="btn-gold" id="start-scan" style="margin-top:10px;">بدء مسح الكود</button>
            </div>
        </div>

        <div id="admin-area" class="hidden">
            <div class="card">
                <h3>📝 إضافة ضيوف</h3>
                <select id="client-select"></select>
                <input id="g-name" placeholder="اسم الضيف">
                <input id="g-phone" placeholder="الجوال (966)">
                <button style="background:#8ebf9a; color:white;" id="save-guest">إضافة للجدول</button>
            </div>
        </div>

        <div class="card" style="overflow-x:auto;">
            <h3>بيانات الضيوف</h3>
            <div id="data-table"></div>
        </div>
    </div>

    <div id="guest-section" class="hidden">
        <div class="card">
            <h1 id="inv-event"></h1>
            <img id="inv-img" style="width:100%; border-radius:15px;">
            <div id="inv-guest" style="font-size:1.5rem; font-weight:bold; margin:15px 0;"></div>
            <div id="guest-actions">
                <button id="btn-yes" style="background:#8ebf9a; color:white;">تأكيد الحضور ✅</button>
                <button id="btn-no" style="background:#eee; color:#666; margin-top:10px;">اعتذار ❌</button>
            </div>
            <div id="qr-result" class="hidden">
                <div id="qrcode" style="display:flex; justify-content:center; margin:15px;"></div>
                <p style="color:#27ae60;">يرجى إبراز الكود عند الدخول ✅</p>
                <a id="inv-map" target="_blank" style="color:var(--gold);">📍 الموقع</a>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, query, where, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBycODn3kTe7uRIBYifDogSPmv2towU6lA", projectId: "wedding-system-6fadd", appId: "1:902051092170:web:e228d3138a5b091b974633" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const BASE_URL = "https://abdulrhman9591.github.io/wedding-system1/";

    let adminPh = ""; const role = sessionStorage.getItem('role');

    // وظيفة الإسكان (الماسح)
    let html5QrCode;
    window.startScanner = () => {
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: { width: 250, height: 250 } },
            async (decodedText) => {
                // عند قراءة الكود (ID الضيف)
                const gRef = doc(db, "v30_guests", decodedText);
                const gSnap = await getDoc(gRef);
                if(gSnap.exists()) {
                    await updateDoc(gRef, { status: "حضور" });
                    alert("تم تسجيل دخول: " + gSnap.data().name);
                    location.reload();
                }
            }
        ).catch(err => alert("خطأ في الكاميرا"));
    };

    if(document.getElementById('start-scan')) {
        document.getElementById('start-scan').onclick = () => window.startScanner();
    }

    // منطق الواتساب
    window.sendToWA = (phone, message) => {
        const url = `https://api.whatsapp.com/send?phone=${phone.replace(/\D/g, '')}&text=${encodeURIComponent(message)}`;
        setTimeout(() => { window.location.assign(url); }, 100);
    };

    // ... تحميل البيانات والجدول ...
    async function loadData(cl) {
        const cSnap = await getDocs(query(collection(db, "v30_data"), where("name", "==", cl)));
        let ev = ""; let host = ""; cSnap.forEach(cd => { ev = cd.data().event; host = cd.data().host; });

        const snap = await getDocs(query(collection(db, "v30_guests"), where("belongsTo", "==", cl)));
        let h = `<table><tr><th>الاسم</th><th>الحالة</th>`;
        if(role === 'admin') h += `<th>الإجراءات</th>`;
        h += `</tr>`;
        
        snap.forEach(d => {
            const g = d.data();
            const msg = `أهلاً بك يا ${g.name} ✨\nنتشرف بدعوتكم لحضور ${ev}..\nللتأكيد:\n${BASE_URL}?id=${d.id}\nالداعي: ${host}`;
            h += `<tr><td>${g.name}</td><td>${g.status}</td>`;
            if(role === 'admin') {
                h += `<td><button onclick="window.sendToWA('${g.phone}', \`${msg}\`)" class="btn-wa">إرسال</button></td>`;
            }
            h += `</tr>`;
        });
        document.getElementById('data-table').innerHTML = h + "</table>";
    }

    // ... باقي وظائف تسجيل الدخول والمبادرة ...
    document.getElementById('login-btn').onclick = async () => {
        const u = document.getElementById('user-input').value;
        const p = document.getElementById('pass-input').value;
        if(u === "admin" && p === "123456") { sessionStorage.setItem('role','admin'); sessionStorage.setItem('user',u); location.reload(); }
        else {
            const q = query(collection(db, "v30_data"), where("name","==",u), where("password","==",p));
            const snap = await getDocs(q);
            if(!snap.empty) { sessionStorage.setItem('role','client'); sessionStorage.setItem('user',u); location.reload(); }
        }
    };

    window.logout = () => { sessionStorage.clear(); location.reload(); };

    async function init() {
        const guestId = new URLSearchParams(window.location.search).get('id');
        if(guestId) {
            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('guest-section').classList.remove('hidden');
            const g = await getDoc(doc(db, "v30_guests", guestId));
            if(g.exists()){
                document.getElementById('inv-guest').innerText = g.data().name;
                const c = await getDocs(query(collection(db, "v30_data"), where("name", "==", g.data().belongsTo)));
                c.forEach(cd => {
                    document.getElementById('inv-event').innerText = cd.data().event;
                    document.getElementById('inv-img').src = cd.data().img;
                    document.getElementById('inv-map').href = cd.data().map;
                });
                if(g.data().status === "حضور") {
                    document.getElementById('guest-actions').classList.add('hidden');
                    document.getElementById('qr-result').classList.remove('hidden');
                    new QRCode(document.getElementById("qrcode"), { text: guestId, width: 120, height: 120 });
                } else {
                    document.getElementById('btn-yes').onclick = async () => { await updateDoc(doc(db, "v30_guests", guestId), { status: "حضور" }); location.reload(); };
                    document.getElementById('btn-no').onclick = async () => { await updateDoc(doc(db, "v30_guests", guestId), { status: "اعتذار" }); location.reload(); };
                }
            }
        } else if(sessionStorage.getItem('role')) {
            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('dashboard-section').classList.remove('hidden');
            const user = sessionStorage.getItem('user');
            document.getElementById('welcome-msg').innerText = "مرحباً: " + user;
            if(role === 'admin') {
                document.getElementById('admin-scanner').classList.remove('hidden');
                document.getElementById('admin-area').classList.remove('hidden');
                const s = await getDocs(collection(db, "v30_data"));
                const sel = document.getElementById('client-select');
                s.forEach(d => sel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`);
                sel.onchange = () => loadData(sel.value);
                document.getElementById('save-guest').onclick = async () => {
                    let p = document.getElementById('g-phone').value; if(p.startsWith('0')) p = '966' + p.substring(1);
                    await addDoc(collection(db, "v30_guests"), { belongsTo: sel.value, name: document.getElementById('g-name').value, phone: p, status: "انتظار" });
                    loadData(sel.value);
                };
            } else loadData(user);
        }
    }
    init();
</script>
</body>
</html>
