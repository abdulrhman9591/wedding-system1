<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام رونق للدعوات ⚜️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --pink: #fdf2f2; --gold: #c5a059; --dark-gold: #b38b7d; --black: #1a1a1a; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--pink); background-image: url('https://www.transparenttextures.com/patterns/islamic-art.png'); margin: 0; padding: 0; direction: rtl; }
        .container { width: 95%; max-width: 900px; margin: auto; padding: 20px; }
        .brand-header { text-align: center; margin-bottom: 40px; }
        .main-logo { width: 180px; height: 180px; border-radius: 50%; border: 5px double var(--gold); background: #ffffff; box-shadow: 0 10px 30px rgba(0,0,0,0.2); padding: 8px; object-fit: contain; display: block; margin: 0 auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 25px; }
        .stat-card { background: linear-gradient(145deg, var(--black), #333); color: var(--gold); padding: 15px 5px; border-radius: 15px; text-align: center; border: 1px solid var(--gold); }
        .stat-card h4 { font-size: 11px; margin: 0; }
        .stat-card p { margin: 5px 0 0; font-size: 18px; font-weight: bold; }
        .admin-quick-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn-nav { background: #2c3e50; color: white; padding: 10px; border-radius: 10px; font-size: 12px; text-decoration: none; border: 1px solid var(--gold); cursor: pointer; text-align: center; }
        .card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; border-top: 5px solid var(--gold); }
        .hidden { display: none !important; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; font-family: 'Cairo'; box-sizing: border-box; }
        button { cursor: pointer; padding: 12px; border-radius: 10px; border: none; font-weight: bold; transition: 0.3s; font-family: 'Cairo'; width: 100%; }
        .btn-gold { background: var(--gold); color: white; }
        .btn-wa { background: #25D366 !important; color: white !important; padding: 6px 10px; border-radius: 8px; font-size: 11px; margin: 2px; }
        .btn-edit { background: #3498db !important; color: white !important; padding: 6px 10px; border-radius: 8px; font-size: 11px; margin: 2px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border-radius: 15px; overflow: hidden; }
        th { background: var(--black); color: var(--gold); padding: 15px; font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; font-size: 13px; }
        .status-pill { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .status-مؤكد { background: #e3f2fd; color: #1976d2; }
        .status-تم-الدخول { background: #e8f5e9; color: #2e7d32; }
        .status-اعتذار { background: #ffebee; color: #c62828; }
        .status-انتظار { background: #fff8e1; color: #f9a825; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section" class="hidden">
        <div class="card" style="max-width: 400px; margin: auto;">
            <div class="brand-header"><img src="logo.jpg" class="main-logo"></div>
            <h2 style="color:var(--gold)">دخول النظام ⚜️</h2>
            <input id="user-input" placeholder="اسم المستخدم">
            <input id="pass-input" type="password" placeholder="كلمة المرور">
            <button class="btn-gold" id="login-btn">دخول</button>
        </div>
    </div>

    <div id="dashboard-section" class="hidden">
        <div class="brand-header"><img src="logo.jpg" class="main-logo"><h3 id="welcome-msg"></h3></div>
        
        <div class="stats-grid">
            <div class="stat-card"><h4>الإجمالي</h4><p id="stat-total">0</p></div>
            <div class="stat-card"><h4>أكدوا</h4><p id="stat-yes">0</p></div>
            <div class="stat-card"><h4>دخلوا فعلياً</h4><p id="stat-entered">0</p></div>
            <div class="stat-card"><h4>اعتذارات</h4><p id="stat-no">0</p></div>
        </div>

        <div id="admin-area" class="hidden">
            <div class="card">
                <h3>⚙️ إعدادات الإدارة السريعة</h3>
                <div class="admin-quick-actions">
                    <button class="btn-nav" onclick="window.open('scan.html', '_blank')">🔍 ماسح الكود</button>
                    <button class="btn-nav" onclick="window.open('orders.html', '_blank')">📥 طلبات العملاء</button>
                </div>
            </div>
            <div class="card">
                <h3>🎀 إضافة ضيوف</h3>
                <select id="client-select"></select>
                <input id="g-name" placeholder="اسم الضيف">
                <input id="g-phone" placeholder="الجوال (966...)">
                <button class="btn-gold" id="save-guest" style="background:#27ae60">إضافة للجدول</button>
            </div>
        </div>

        <div id="table-card" class="card hidden" style="overflow-x:auto;">
            <h3 id="table-title">قائمة الضيوف 📜</h3>
            <div id="data-table"></div>
        </div>

        <div class="card" style="border-top:none;">
            <p id="client-msg" class="hidden" style="color:var(--dark-gold); font-weight:bold;">شكراً لثقتكم في رونق للدعوات. تظهر هنا تحديثات حفلكم مباشرة.</p>
            <button onclick="window.logout()" style="background: #eee; color: #666;">تسجيل الخروج</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, query, where, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBycODn3kTe7uRIBYifDogSPmv2towU6lA", projectId: "wedding-system-6fadd", appId: "1:902051092170:web:e228d3138a5b091b974633" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const role = sessionStorage.getItem('role');
    const user = sessionStorage.getItem('user');

    window.logout = () => { sessionStorage.clear(); location.reload(); };

    async function loadData(cl) {
        if (!cl) return;
        const snap = await getDocs(query(collection(db, "v30_guests"), where("belongsTo", "==", cl)));
        const guestsArr = snap.docs.map(d => d.data());

        // تحديث الإحصائيات (تظهر للعميل والأدمن)
        document.getElementById('stat-total').innerText = guestsArr.length;
        document.getElementById('stat-yes').innerText = guestsArr.filter(g => g.status === 'مؤكد' || g.status === 'تم-الدخول').length;
        document.getElementById('stat-entered').innerText = guestsArr.filter(g => g.status === 'تم-الدخول').length;
        document.getElementById('stat-no').innerText = guestsArr.filter(g => g.status === 'اعتذار').length;

        // بناء الجدول فقط إذا كان المستخدم أدمن
        if(role === 'admin') {
            document.getElementById('table-card').classList.remove('hidden');
            let h = `<table><tr><th>الاسم</th><th>الحالة</th><th>إجراء</th></tr>`;
            snap.forEach(d => {
                const g = d.data();
                h += `<tr><td>${g.name}</td><td><span class="status-pill status-${g.status}">${g.status}</span></td>
                    <td><button class="btn-edit" onclick="alert('وظيفة الأدمن')">تعديل</button></td></tr>`;
            });
            document.getElementById('data-table').innerHTML = h + "</table>";
        } else {
            // إذا كان عميل، نخفي الجدول ونظهر رسالة ترحيبية
            document.getElementById('table-card').classList.add('hidden');
            document.getElementById('client-msg').classList.remove('hidden');
        }
    }

    document.getElementById('login-btn').onclick = async () => {
        const u = document.getElementById('user-input').value, p = document.getElementById('pass-input').value;
        if(u === "admin" && p === "123456") {
            sessionStorage.setItem('role','admin'); sessionStorage.setItem('user',u); location.reload();
        } else {
            const snap = await getDocs(query(collection(db, "v30_data"), where("name","==",u), where("password","==",p)));
            if(!snap.empty) {
                sessionStorage.setItem('role','client'); sessionStorage.setItem('user',u); location.reload();
            } else alert("خطأ في البيانات!");
        }
    };

    async function init() {
        if(sessionStorage.getItem('role')) {
            document.getElementById('dashboard-section').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = "لوحة تحكم: " + user;
            if(role === 'admin') {
                document.getElementById('admin-area').classList.remove('hidden');
                // تحميل قائمة العملاء للأدمن لاختيار الحفل
                const s = await getDocs(collection(db, "v30_data"));
                const sel = document.getElementById('client-select');
                sel.innerHTML = "<option>اختر حفل العميل...</option>";
                s.forEach(d => sel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`);
                sel.onchange = () => loadData(sel.value);
            } else {
                loadData(user); // العميل يرى إحصائياته فوراً
            }
        } else {
            document.getElementById('login-section').classList.remove('hidden');
        }
    }
    init();
</script>
</body>
</html>
