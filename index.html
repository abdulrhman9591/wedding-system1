<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الزفاف</title>
    <style>
        :root { --primary: #e94560; --bg: #0a0a12; --card: #16213e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 20px; text-align: center; }
        .box { background: var(--card); padding: 20px; border-radius: 12px; margin: 20px auto; max-width: 500px; border: 1px solid #0f3460; }
        input { padding: 12px; border-radius: 8px; border: none; width: 80%; margin-bottom: 10px; font-size: 16px; }
        button { cursor: pointer; padding: 12px 25px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: bold; width: 85%; }
        .client-card { background: #1a1a2e; padding: 15px; margin-top: 10px; border-radius: 8px; border-right: 4px solid var(--primary); text-align: right; }
    </style>
</head>
<body>

    <h1>لوحة تحكم العرس 💍</h1>

    <div class="box">
        <h3>إضافة عميل جديد</h3>
        <input id="cName" type="text" placeholder="اسم القاعة أو العميل">
        <button id="addBtn">إضافة للـ Firebase</button>
    </div>

    <div class="box">
        <h3>العملاء الحاليين</h3>
        <div id="display">جاري التحميل...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // الـ Config الخاص بك من صورتك الأخيرة
        const firebaseConfig = {
            apiKey: "AIzaSyBycODn3kTe7uRIBYifDogSPmv2towU6lA",
            authDomain: "wedding-system-6fadd.firebaseapp.com",
            projectId: "wedding-system-6fadd",
            storageBucket: "wedding-system-6fadd.firebasestorage.app",
            messagingSenderId: "902051092170",
            appId: "1:902051092170:web:e228d3138a5b091b974633",
            measurementId: "G-PVXHPX75ZX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.addClient = async () => {
            const name = document.getElementById("cName").value;
            if(!name) return alert("اكتب الاسم أولاً");
            try {
                await addDoc(collection(db, "clients"), { name: name, timestamp: new Date() });
                document.getElementById("cName").value = "";
                alert("تم الحفظ بنجاح!");
                loadClients();
            } catch (e) { alert("خطأ: " + e.message); }
        };

        window.loadClients = async () => {
            const display = document.getElementById("display");
            const querySnapshot = await getDocs(collection(db, "clients"));
            display.innerHTML = "";
            querySnapshot.forEach((doc) => {
                display.innerHTML += `<div class="client-card">👤 العميل: ${doc.data().name}</div>`;
            });
            if(display.innerHTML === "") display.innerHTML = "لا يوجد عملاء";
        };

        document.getElementById("addBtn").onclick = addClient;
        loadClients();
    </script>
</body>
</html>
