<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الزفاف الملكي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --soft-pink: #fdf2f2; --rose-gold: #e5b3a3; --deep-gray: #5a5a5a; --pure-white: #ffffff; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--soft-pink); margin: 0; padding: 0; }
        .container { width: 95%; max-width: 1200px; margin: auto; padding: 20px; }
        .hidden { display: none !important; }
        .card { background: var(--pure-white); border-radius: 20px; padding: 30px; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.03); text-align: center; border: 1px solid rgba(229, 179, 163, 0.2); }
        h1 { color: var(--rose-gold); font-family: 'Amiri', serif; font-size: 2.5em; }
        input, select, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #eee; background: #fafafa; box-sizing: border-box; font-family: 'Cairo'; }
        button { cursor: pointer; padding: 15px; border-radius: 12px; border: none; font-weight: bold; width: 100%; transition: 0.3s; font-family: 'Cairo'; }
        .btn-main { background: var(--rose-gold); color: white; font-size: 1.1em; }
        .btn-danger { background: #f8d7da; color: #721c24; width: auto; padding: 8px 15px; }
        .inv-box { max-width: 500px; margin: 40px auto; border: 2px solid var(--rose-gold); padding: 30px; background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; text-align: right; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div id="app" class="container">
    <div id="login-page" class="card" style="max-width: 450px; margin: 80px auto;">
        <h1>دخول النظام 🌸</h1>
        <input id="user-input" type="text" placeholder="اسم المستخدم">
        <input id="pass-input" type="password" placeholder="كلمة المرور">
        <button class="btn-main" id="login-btn">دخول</button>
    </div>

    <div id="main-page" class="hidden">
        <div class="card" style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin:0; color:var(--rose-gold)">لوحة التحكم</h2>
            <button id="logout-btn" class="btn-danger">خروج</button>
        </div>

        <div id="admin-view" class="hidden">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
                <div class="card">
                    <h3>🎀 تأسيس حفل</h3>
                    <input id="c-name" placeholder="اسم العميل">
                    <input id="c-event" placeholder="عنوان الحفل">
                    <input id="c-img" placeholder="رابط الصورة">
                    <input id="c-map" placeholder="رابط الخريطة">
                    <button id="add-client-btn" class="btn-main">حفظ وإعداد</button>
                </div>
                <div class="card">
                    <h3>📝 إضافة ضيوف</h3>
                    <select id="client-select"></select>
                    <input id="g-name" placeholder="اسم الضيف">
                    <input id="g-phone" placeholder="رقم الجوال">
                    <button id="add-guest-btn" class="btn-main" style="background:#8ebf9a">إضافة ضيف</button>
                </div>
            </div>
            <div class="card">
                <h3>📋 قائمة المدعوين</h3>
                <div id="admin-table"></div>
            </div>
        </div>

        <div id="client-view" class="hidden">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="card"><h1><span id="stat-yes" style="color:#8ebf9a">0</span></h1><p>حضور</p></div>
                <div class="card"><h1><span id="stat-no" style="color:#e5b3a3">0</span></h1><p>اعتذار</p></div>
            </div>
            <div class="card"><table><thead><tr><th>الاسم</th><th>الحالة</th></tr></thead><tbody id="client-body"></tbody></table></div>
        </div>
    </div>

    <div id="guest-page" class="hidden">
        <div class="inv-box card">
            <h1 id="inv-event"></h1>
            <img id="inv-img" style="width:100%; border-radius:15px; margin-bottom:20px;">
            <h2 id="inv-guest"></h2>
            <div id="guest-actions">
                <button id="confirm-btn" class="btn-main" style="background:#8ebf9a; margin-bottom:10px;">سأحضر ✅</button>
                <button id="decline-btn" class="btn-main" style="background:#f4f4f4; color:#888">أعتذر ❌</button>
            </div>
            <div id="guest-final-yes" class="hidden">
                <h2 style="color:#8ebf9a">نسعد بحضورك! ✨</h2>
                <div id="qrcode"></div>
                <p>📍 الموقع: <a id="inv-map" href="#" target="_blank">اضغط هنا</a></p>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, query, where, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBycODn3kTe7uRIBYifDogSPmv2towU6lA",
        authDomain: "wedding-system-6fadd.firebaseapp.com",
        projectId: "wedding-system-6fadd",
        storageBucket: "wedding-system-6fadd.firebasestorage.app",
        messagingSenderId: "902051092170",
        appId: "1:902051092170:web:e228d3138a5b091b974633"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const DB_VER = "v12"; // إصدار جديد للبيانات لضمان النظافة

    // --- وظائف النظام الرئيسية ---

    async function handleLogin() {
        const u = document.getElementById('user-input').value;
        const p = document.getElementById('pass-input').value;
        if(u === "admin" && p === "123456") {
            localStorage.setItem('loggedUser', 'admin');
            localStorage.setItem('userRole', 'admin');
            location.reload();
        } else {
            const q = query(collection(db, `${DB_VER}_clients`), where("name", "==", u));
            const s = await getDocs(q);
            if(!s.empty) {
                localStorage.setItem('loggedUser', u);
                localStorage.setItem('userRole', 'client');
                location.reload();
            } else alert("البيانات غير صحيحة");
        }
    }

    async function addClient() {
        const data = {
            name: document.getElementById('c-name').value,
            event: document.getElementById('c-event').value,
            img: document.getElementById('c-img').value,
            map: document.getElementById('c-map').value
        };
        await addDoc(collection(db, `${DB_VER}_clients`), data);
        location.reload();
    }

    async function addGuest() {
        const c = document.getElementById('client-select').value;
        const n = document.getElementById('g-name').value;
        let p = document.getElementById('g-phone').value;
        if(p.startsWith('0')) p = '966' + p.substring(1);
        await addDoc(collection(db, `${DB_VER}_guests`), { belongsTo: c, name: n, phone: p, status: "انتظار" });
        loadAdminTable();
    }

    async function loadAdminTable() {
        const c = document.getElementById('client-select').value;
        const q = query(collection(db, `${DB_VER}_guests`), where("belongsTo", "==", c));
        const s = await getDocs(q);
        let h = `<table><tr><th>الاسم</th><th>الحالة</th><th>إجراء</th></tr>`;
        s.forEach(d => {
            const g = d.data();
            const link = window.location.origin + window.location.pathname + "?id=" + d.id;
            h += `<tr><td>${g.name}</td><td>${g.status}</td><td>
                <button onclick="window.open('https://wa.me/${g.phone}?text=${encodeURIComponent('دعوة خاصة لـ ' + g.name + ' الرابط: ' + link)}')" style="background:#58cc71; color:white; width:auto; padding:5px;">واتس</button>
            </td></tr>`;
        });
        document.getElementById('admin-table').innerHTML = h + "</table>";
    }

    async function updateGuestStatus(yes) {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        await updateDoc(doc(db, `${DB_VER}_guests`, id), { status: yes ? "حضور" : "اعتذار" });
        location.reload();
    }

    // --- ربط الأحداث برمجياً (حل مشكلة handleLogin is not defined) ---

    document.addEventListener('DOMContentLoaded', () => {
        const loginBtn = document.getElementById('login-btn');
        if(loginBtn) loginBtn.onclick = handleLogin;

        const logoutBtn = document.getElementById('logout-btn');
        if(logoutBtn) logoutBtn.onclick = () => { localStorage.clear(); location.reload(); };

        const addClientBtn = document.getElementById('add-client-btn');
        if(addClientBtn) addClientBtn.onclick = addClient;

        const addGuestBtn = document.getElementById('add-guest-btn');
        if(addGuestBtn) addGuestBtn.onclick = addGuest;

        const confirmBtn = document.getElementById('confirm-btn');
        if(confirmBtn) confirmBtn.onclick = () => updateGuestStatus(true);

        const declineBtn = document.getElementById('decline-btn');
        if(declineBtn) declineBtn.onclick = () => updateGuestStatus(false);
        
        const clientSelect = document.getElementById('client-select');
        if(clientSelect) clientSelect.onchange = loadAdminTable;
    });

    // --- تشغيل الصفحة بناءً على الرابط ---

    const urlParams = new URLSearchParams(window.location.search);
    const guestId = urlParams.get('id');

    if(guestId) {
        document.getElementById('login-page').classList.add('hidden');
        document.getElementById('guest-page').classList.remove('hidden');
        const gSnap = await getDoc(doc(db, `${DB_VER}_guests`, guestId));
        if(gSnap.exists()) {
            const g = gSnap.data();
            document.getElementById('inv-guest').innerText = "يا " + g.name;
            const cSnap = await getDocs(query(collection(db, `${DB_VER}_clients`), where("name", "==", g.belongsTo)));
            cSnap.forEach(d => {
                const c = d.data();
                document.getElementById('inv-event').innerText = c.event;
                document.getElementById('inv-img').src = c.img;
                document.getElementById('inv-map').href = c.map;
            });
            if(g.status === "حضور") {
                document.getElementById('guest-actions').classList.add('hidden');
                document.getElementById('guest-final-yes').classList.remove('hidden');
                new QRCode(document.getElementById("qrcode"), { text: guestId, width: 120, height: 120 });
            } else if(g.status === "اعتذار") {
                document.getElementById('guest-actions').innerHTML = "<h3>شكراً لك، تم تسجيل اعتذارك.</h3>";
            }
        }
    } else if(localStorage.getItem('loggedUser')) {
        document.getElementById('login-page').classList.add('hidden');
        document.getElementById('main-page').classList.remove('hidden');
        const role = localStorage.getItem('userRole');
        const user = localStorage.getItem('loggedUser');
        
        if(role === 'admin') {
            document.getElementById('admin-view').classList.remove('hidden');
            const s = await getDocs(collection(db, `${DB_VER}_clients`));
            const sel = document.getElementById('client-select');
            sel.innerHTML = "<option value=''>اختر الحفل...</option>";
            s.forEach(d => sel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`);
        } else {
            document.getElementById('client-view').classList.remove('hidden');
            const q = query(collection(db, `${DB_VER}_guests`), where("belongsTo", "==", user));
            const s = await getDocs(q);
            let y = 0, n = 0;
            s.forEach(d => {
                const g = d.data();
                if(g.status === 'حضور') y++; else if(g.status === 'اعتذار') n++;
                document.getElementById('client-body').innerHTML += `<tr><td>${g.name}</td><td>${g.status}</td></tr>`;
            });
            document.getElementById('stat-yes').innerText = y;
            document.getElementById('stat-no').innerText = n;
        }
    }
</script>
</body>
</html>
