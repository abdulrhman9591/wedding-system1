<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الإدارة المركزية - إرسال الواتساب</title>
    <style>
        :root { --primary: #e94560; --bg: #0a0a12; --card: #16213e; --success: #25d366; --danger: #ff4d4d; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: white; margin: 0; }
        .container { width: 95%; max-width: 1400px; margin: 20px auto; }
        .hidden { display: none !important; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #050510; color: white; box-sizing: border-box; }
        button { cursor: pointer; padding: 10px 20px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; background: var(--card); margin-top: 20px; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #222; }
        .wa-btn { background: var(--success); text-decoration: none; color: white; padding: 5px 10px; border-radius: 5px; font-size: 0.9em; display: inline-block; }
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-item { padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-page" style="max-width: 400px; margin: 100px auto;" class="card">
        <h2 style="text-align:center">دخول النظام</h2>
        <input id="user-input" type="text" placeholder="اسم المستخدم">
        <input id="pass-input" type="password" placeholder="كلمة المرور">
        <button style="width: 100%" onclick="handleLogin()">دخول</button>
    </div>

    <div id="main-content" class="container hidden">
        <div style="display:flex; justify-content:space-between; align-items:center" class="card">
            <h2 id="view-title">لوحة التحكم</h2>
            <button onclick="location.reload()" style="background:#444">خروج</button>
        </div>

        <div id="admin-view" class="hidden">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px">
                <div class="card">
                    <h3>1. تأسيس العميل</h3>
                    <input id="new-client-name" type="text" placeholder="اسم العميل">
                    <textarea id="new-client-msg" placeholder="نص الرسالة"></textarea>
                    <input id="new-client-file" type="text" placeholder="رابط صورة الدعوة">
                    <button onclick="addClient()">حفظ العميل</button>
                </div>
                <div class="card">
                    <h3>2. إضافة ضيف</h3>
                    <select id="select-client-for-guest"></select>
                    <input id="guest-name" type="text" placeholder="اسم الضيف">
                    <input id="guest-phone" type="tel" placeholder="رقم الجوال (مثال: 050...)">
                    <button style="background:var(--accent)" onclick="addGuest()">إضافة وإرسال</button>
                </div>
            </div>

            <div class="card">
                <h3>إدارة كافة الضيوف (الأدمن)</h3>
                <div id="admin-table-area"></div>
            </div>
        </div>

        <div id="client-view" class="hidden">
            <div class="stats-bar">
                <div class="stat-item" style="background:#2ecc71">حضور: <span id="count-yes">0</span></div>
                <div class="stat-item" style="background:#ff4d4d">اعتذار: <span id="count-no">0</span></div>
                <div class="stat-item" style="background:#555">لم يحدد: <span id="count-wait">0</span></div>
            </div>
            <div class="card">
                <table>
                    <thead><tr><th>الاسم</th><th>الحالة</th></tr></thead>
                    <tbody id="client-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBycODn3kTe7uRIBYifDogSPmv2towU6lA",
            authDomain: "wedding-system-6fadd.firebaseapp.com",
            projectId: "wedding-system-6fadd",
            storageBucket: "wedding-system-6fadd.firebasestorage.app",
            messagingSenderId: "902051092170",
            appId: "1:902051092170:web:e228d3138a5b091b974633"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allClientsData = {};

        window.handleLogin = async () => {
            const user = document.getElementById("user-input").value;
            const pass = document.getElementById("pass-input").value;
            if(user === "admin" && pass === "123456") {
                document.getElementById("login-page").classList.add("hidden");
                document.getElementById("main-content").classList.remove("hidden");
                document.getElementById("admin-view").classList.remove("hidden");
                loadAdminData();
            } else {
                checkClient(user);
            }
        };

        window.addClient = async () => {
            const name = document.getElementById("new-client-name").value;
            const msg = document.getElementById("new-client-msg").value;
            const file = document.getElementById("new-client-file").value;
            await addDoc(collection(db, "v3_clients"), { name, msg, file });
            alert("تم الحفظ");
            loadAdminData();
        };

        window.addGuest = async () => {
            const belongsTo = document.getElementById("select-client-for-guest").value;
            const name = document.getElementById("guest-name").value;
            let phone = document.getElementById("guest-phone").value.replace(/\s+/g, '');
            
            // تصحيح الرقم لـ 966
            if(phone.startsWith('0')) phone = '966' + phone.substring(1);
            if(!phone.startsWith('966')) phone = '966' + phone;

            await addDoc(collection(db, "v3_guests"), { belongsTo, name, phone, status: "لم يحدد" });
            loadAdminData();
        };

        async function loadAdminData() {
            const sel = document.getElementById("select-client-for-guest");
            const clientsSnap = await getDocs(collection(db, "v3_clients"));
            sel.innerHTML = "";
            allClientsData = {};
            clientsSnap.forEach(d => {
                const c = d.data();
                allClientsData[c.name] = c;
                sel.innerHTML += `<option value="${c.name}">${c.name}</option>`;
            });

            const guestsSnap = await getDocs(collection(db, "v3_guests"));
            const area = document.getElementById("admin-table-area");
            area.innerHTML = `<table><thead><tr><th>الضيف</th><th>العميل</th><th>الحالة</th><th>إجراء</th></tr></thead><tbody id="admin-body"></tbody></table>`;
            const tbody = document.getElementById("admin-body");
            
            guestsSnap.forEach(d => {
                const g = d.data();
                tbody.innerHTML += `<tr>
                    <td>${g.name}</td>
                    <td>${g.belongsTo}</td>
                    <td>
                        <select onchange="updateStat('${d.id}', this.value)">
                            <option ${g.status==='لم يحدد'?'selected':''}>لم يحدد</option>
                            <option ${g.status==='حضور'?'selected':''}>حضور</option>
                            <option ${g.status==='اعتذار'?'selected':''}>اعتذار</option>
                        </select>
                    </td>
                    <td>
                        <button class="wa-btn" onclick="sendWA('${g.belongsTo}', '${g.phone}', '${g.name}')">واتساب 📱</button>
                        <button style="background:var(--danger)" onclick="delGuest('${d.id}')">حذف</button>
                    </td>
                </tr>`;
            });
        }

        window.sendWA = (clientName, phone, guestName) => {
            const c = allClientsData[clientName];
            const text = encodeURIComponent(`يا ${guestName}\n${c.msg}\n${c.file ? 'رابط الدعوة: ' + c.file : ''}`);
            window.open(`https://wa.me/${phone}?text=${text}`, '_blank');
        };

        window.updateStat = async (id, val) => { await updateDoc(doc(db, "v3_guests", id), { status: val }); };
        window.delGuest = async (id) => { if(confirm("حذف؟")) { await deleteDoc(doc(db, "v3_guests", id)); loadAdminData(); } };

        async function checkClient(name) {
            const q = query(collection(db, "v3_clients"), where("name", "==", name));
            const snap = await getDocs(q);
            if(snap.empty) return alert("الاسم غير موجود");
            document.getElementById("login-page").classList.add("hidden");
            document.getElementById("main-content").classList.remove("hidden");
            document.getElementById("client-view").classList.remove("hidden");
            loadClientView(name);
        }

        async function loadClientView(name) {
            const q = query(collection(db, "v3_guests"), where("belongsTo", "==", name));
            const snap = await getDocs(q);
            const body = document.getElementById("client-body");
            body.innerHTML = "";
            let counts = { yes:0, no:0, wait:0 };
            snap.forEach(d => {
                const g = d.data();
                if(g.status==='حضور') counts.yes++; else if(g.status==='اعتذار') counts.no++; else counts.wait++;
                body.innerHTML += `<tr><td>${g.name}</td><td>${g.status}</td></tr>`;
            });
            document.getElementById("count-yes").innerText = counts.yes;
            document.getElementById("count-no").innerText = counts.no;
            document.getElementById("count-wait").innerText = counts.wait;
        }
    </script>
</body>
</html>
