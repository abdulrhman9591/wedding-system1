<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الزفاف الاحترافي</title>
    <style>
        :root { --primary: #e94560; --bg: #0f3460; --dark: #1a1a2e; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--dark); color: var(--white); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* تصميم الواجهة المتوسعة */
        .header { background: var(--bg); padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .container { flex: 1; width: 95%; max-width: 1200px; margin: 20px auto; }
        
        .login-box { max-width: 400px; margin: 100px auto; background: var(--bg); padding: 30px; border-radius: 15px; text-align: center; }
        .hidden { display: none !important; }
        
        /* القائمة العلوية */
        .nav-bar { display: flex; justify-content: space-between; background: #16213e; padding: 10px 20px; border-radius: 10px; margin-bottom: 20px; align-items: center; }
        
        /* التنسيقات العامة */
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #1a1a2e; color: white; border: 1px solid #4e4eef; box-sizing: border-box; }
        button { cursor: pointer; padding: 12px 20px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: bold; transition: 0.3s; width: 100%; }
        button:hover { transform: scale(1.02); opacity: 0.9; }
        
        /* الجداول والبيانات */
        .data-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--bg); padding: 20px; border-radius: 12px; border-right: 6px solid var(--primary); position: relative; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.8em; background: #4e4eef; }
        .btn-red { background: #ff4d4d; width: auto; margin-top: 10px; padding: 5px 15px; }
    </style>
</head>
<body>

    <div id="login-page" class="login-box">
        <h2>تسجيل الدخول 🛡️</h2>
        <input id="login-user" type="text" placeholder="اسم المستخدم">
        <input id="login-pass" type="password" placeholder="كلمة المرور (للأدمن فقط)">
        <button onclick="handleLogin()">دخول</button>
        <p style="font-size: 0.8em; color: #aaa; margin-top: 10px;">للعميل: ادخل اسمك فقط في الخانة الأولى</p>
    </div>

    <div id="main-content" class="container hidden">
        <div class="nav-bar">
            <h3 id="welcome-msg">مرحباً بك</h3>
            <button onclick="logout()" style="width: auto; background: #555;">تسجيل خروج</button>
        </div>

        <div id="admin-view" class="hidden">
            <div class="card" style="margin-bottom: 30px;">
                <h3>إضافة حجز جديد ➕</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input id="cName" type="text" placeholder="اسم العميل">
                    <input id="cPhone" type="tel" placeholder="رقم الجوال">
                    <input id="cDate" type="date">
                    <select id="cStatus">
                        <option value="مؤكد ✅">مؤكد</option>
                        <option value="قيد الانتظار ⏳">قيد الانتظار</option>
                    </select>
                </div>
                <button onclick="addBooking()">حفظ الحجز في النظام</button>
            </div>
            
            <h3>كل الحجوزات (المدير)</h3>
            <div id="admin-list" class="data-grid"></div>
        </div>

        <div id="client-view" class="hidden">
            <div id="client-card-result"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBycODn3kTe7uRIBYifDogSPmv2towU6lA",
            authDomain: "wedding-system-6fadd.firebaseapp.com",
            projectId: "wedding-system-6fadd",
            storageBucket: "wedding-system-6fadd.firebasestorage.app",
            messagingSenderId: "902051092170",
            appId: "1:902051092170:web:e228d3138a5b091b974633"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // نظام الدخول
        window.handleLogin = async () => {
            const user = document.getElementById("login-user").value;
            const pass = document.getElementById("login-pass").value;

            if (user === "admin" && pass === "123456") {
                showDashboard("admin", "المدير");
            } else if (user !== "") {
                checkClient(user);
            } else {
                alert("يرجى إدخال اسم المستخدم");
            }
        };

        function showDashboard(role, name) {
            document.getElementById("login-page").classList.add("hidden");
            document.getElementById("main-content").classList.remove("hidden");
            document.getElementById("welcome-msg").innerText = "مرحباً: " + name;
            
            if(role === "admin") {
                document.getElementById("admin-view").classList.remove("hidden");
                loadAdminData();
            } else {
                document.getElementById("client-view").classList.remove("hidden");
            }
        }

        window.logout = () => location.reload();

        // للأدمن: إضافة حجز
        window.addBooking = async () => {
            const name = document.getElementById("cName").value;
            const phone = document.getElementById("cPhone").value;
            const date = document.getElementById("cDate").value;
            const status = document.getElementById("cStatus").value;

            if(!name || !date) return alert("اكمل البيانات");
            await addDoc(collection(db, "full_system"), { name, phone, date, status });
            alert("تم الحفظ");
            loadAdminData();
        };

        // للأدمن: عرض الكل
        window.loadAdminData = async () => {
            const list = document.getElementById("admin-list");
            const snap = await getDocs(collection(db, "full_system"));
            list.innerHTML = "";
            snap.forEach(d => {
                const b = d.data();
                list.innerHTML += `<div class="card">
                    <strong>👤 ${b.name}</strong><br>📅 ${b.date}<br>📞 ${b.phone}
                    <div class="badge">${b.status}</div><br>
                    <button class="btn-red" onclick="deleteItem('${d.id}')">حذف</button>
                </div>`;
            });
        };

        window.deleteItem = async (id) => {
            if(confirm("حذف؟")) { await deleteDoc(doc(db, "full_system", id)); loadAdminData(); }
        };

        // للعميل: رؤية حجزه فقط
        async function checkClient(userName) {
            const q = query(collection(db, "full_system"), where("name", "==", userName));
            const snap = await getDocs(q);
            if(snap.empty) return alert("الاسم غير موجود في الحجوزات");
            
            showDashboard("client", userName);
            const res = document.getElementById("client-card-result");
            snap.forEach(d => {
                const b = d.data();
                res.innerHTML = `
                    <div class="card" style="max-width:500px; margin:auto; border-color: #2ecc71;">
                        <h2>تفاصيل حجزك ✨</h2>
                        <p>الاسم: ${b.name}</p>
                        <p>التاريخ: ${b.date}</p>
                        <p>الحالة: <strong>${b.status}</strong></p>
                        <hr>
                        <p>مرحباً بك، سيتم التواصل معك عبر رقمك: ${b.phone}</p>
                    </div>`;
            });
        }
    </script>
</body>
</html>
