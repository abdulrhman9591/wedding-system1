<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الدعوات الملكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --pink: #fdf2f2; --gold: #e5b3a3; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--pink); margin: 0; padding: 0; direction: rtl; }
        .container { width: 95%; max-width: 1200px; margin: auto; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; font-family: 'Cairo'; box-sizing: border-box; }
        button { cursor: pointer; padding: 12px; border-radius: 10px; border: none; font-weight: bold; transition: 0.3s; font-family: 'Cairo'; }
        .btn-gold { background: var(--gold); color: white; width: 100%; }
        .btn-scan { background: #3498db; color: white; padding: 8px 20px; width: auto; }
        .btn-wa { background: #25D366; color: white; text-decoration: none; padding: 8px 12px; border-radius: 8px; font-size: 13px; display: inline-block; font-weight: bold; }
        .btn-del { background: #ff4d4d; color: white; padding: 5px 8px; border-radius: 5px; font-size: 11px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; min-width: 600px; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-box { background: white; padding: 20px; border-radius: 15px; text-align: center; border: 2px solid var(--gold); }
    </style>
</head>
<body>

<div id="app" class="container">
    <div id="login-section" class="card" style="max-width: 400px; margin: 60px auto;">
        <h2 style="text-align:center; color:var(--gold)">دخول النظام 🌸</h2>
        <input id="user-input" placeholder="اسم المستخدم">
        <input id="pass-input" type="password" placeholder="كلمة المرور">
        <button class="btn-gold" id="login-btn">دخول</button>
    </div>

    <div id="dashboard-section" class="hidden">
        <div class="card" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap:10px;">
            <h3 id="welcome-msg" style="margin:0"></h3>
            <div>
                <button class="btn-scan hidden" id="admin-scan-btn" onclick="window.open('scan.html', '_blank')">📷 الماسح</button>
                <button onclick="logout()" style="background:#888; color:white; padding: 8px 15px;">خروج</button>
            </div>
        </div>

        <div id="admin-area" class="hidden">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px;">
                <div class="card">
                    <h3>🎀 تأسيس حفل</h3>
                    <input id="c-name" placeholder="اسم العميل">
                    <input id="c-pass" placeholder="كلمة مرور العميل">
                    <input id="c-event" placeholder="المناسبة">
                    <input id="c-img" placeholder="رابط الصورة">
                    <input id="c-map" placeholder="رابط الخريطة">
                    <button class="btn-gold" id="save-client">حفظ</button>
                </div>
                <div class="card">
                    <h3>📝 إضافة ضيف</h3>
                    <select id="client-select"></select>
                    <input id="g-name" placeholder="اسم الضيف">
                    <input id="g-phone" placeholder="الجوال (966)">
                    <button style="background:#8ebf9a; color:white; width: 100%;" id="save-guest">إضافة</button>
                </div>
            </div>
        </div>

        <div class="stat-grid">
            <div class="stat-box"><h1 id="count-yes" style="color:#2ecc71">0</h1><p>تأكيد حضور</p></div>
            <div class="stat-box"><h1 id="count-no" style="color:#e74c3c">0</h1><p>اعتذار</p></div>
        </div>

        <div class="card" style="overflow-x:auto;">
            <h3>قائمة البيانات</h3>
            <div id="data-table"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBycODn3kTe7uRIBYifDogSPmv2towU6lA",
        authDomain: "wedding-system-6fadd.firebaseapp.com",
        projectId: "wedding-system-6fadd",
        storageBucket: "wedding-system-6fadd.firebasestorage.app",
        messagingSenderId: "902051092170",
        appId: "1:902051092170:web:e228d3138a5b091b974633"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const BASE_URL = "https://abdulrhman9591.github.io/wedding-system1/";

    // وظيفة الخروج
    window.logout = () => { sessionStorage.clear(); location.reload(); };

    // وظيفة الحذف للأدمن
    window.delG = async (id, c) => { if(confirm("حذف؟")) { await deleteDoc(doc(db, "v30_guests", id)); loadData(c); } };

    // دخول النظام
    document.getElementById('login-btn').onclick = async () => {
        const u = document.getElementById('user-input').value;
        const p = document.getElementById('pass-input').value;

        if(u === "admin" && p === "123456") {
            sessionStorage.setItem('myRole', 'admin'); sessionStorage.setItem('myUser', u);
            location.reload();
        } else {
            const q = query(collection(db, "v30_data"), where("name", "==", u), where("password", "==", p));
            const snap = await getDocs(q);
            if(!snap.empty) {
                sessionStorage.setItem('myRole', 'client'); sessionStorage.setItem('myUser', u);
                location.reload();
            } else { alert("بيانات خاطئة"); }
        }
    };

    async function loadData(client) {
        if(!client) return;
        const q = query(collection(db, "v30_guests"), where("belongsTo", "==", client));
        const snap = await getDocs(q);
        let y=0, n=0, h=`<table><tr><th>الاسم</th><th>الحالة</th>`;
        if(sessionStorage.getItem('myRole') === 'admin') h+=`<th>واتساب</th><th>حذف</th>`;
        h+=`</tr>`;

        snap.forEach(d => {
            const g = d.data();
            if(g.status === "حضور" || g.status === "تم الدخول ✅") y++;
            if(g.status === "اعتذار") n++;
            const link = `${BASE_URL}?id=${d.id}`;
            h+=`<tr><td>${g.name}</td><td>${g.status}</td>`;
            if(sessionStorage.getItem('myRole') === 'admin') {
                h+=`<td><a href="https://wa.me/${g.phone}?text=نتشرف بدعوتكم: ${link}" target="_blank" class="btn-wa">إرسال</a></td>`;
                h+=`<td><button onclick="delG('${d.id}','${client}')" class="btn-del">حذف</button></td>`;
            }
            h+=`</tr>`;
        });
        document.getElementById('data-table').innerHTML = h + "</table>";
        document.getElementById('count-yes').innerText = y;
        document.getElementById('count-no').innerText = n;
    }

    async function init() {
        const role = sessionStorage.getItem('myRole');
        const user = sessionStorage.getItem('myUser');
        if(role) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('dashboard-section').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = "مرحباً: " + user;

            if(role === 'admin') {
                document.getElementById('admin-area').classList.remove('hidden');
                document.getElementById('admin-scan-btn').classList.remove('hidden');
                const s = await getDocs(collection(db, "v30_data"));
                const sel = document.getElementById('client-select');
                sel.innerHTML = "<option value=''>اختر الحفل</option>";
                s.forEach(d => sel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`);
                sel.onchange = () => loadData(sel.value);

                document.getElementById('save-client').onclick = async () => {
                    await addDoc(collection(db, "v30_data"), { name: document.getElementById('c-name').value, password: document.getElementById('c-pass').value, event: document.getElementById('c-event').value, img: document.getElementById('c-img').value, map: document.getElementById('c-map').value });
                    alert("تم الحفظ"); location.reload();
                };
                document.getElementById('save-guest').onclick = async () => {
                    let p = document.getElementById('g-phone').value; if(p.startsWith('0')) p = '966' + p.substring(1);
                    await addDoc(collection(db, "v30_guests"), { belongsTo: sel.value, name: document.getElementById('g-name').value, phone: p, status: "انتظار" });
                    loadData(sel.value);
                };
            } else {
                loadData(user);
            }
        }
    }
    init();
</script>
</body>
</html>
